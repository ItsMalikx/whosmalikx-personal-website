<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home | Malik's Website</title>
  <meta name="description" content="Building simple, useful things on the web." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="site-shell flex-col">
    <header class="topbar">
      <div class="topbar__inner container-wide">
        <a class="brand" href="index.html" aria-label="Home">
          <span class="brand__mark"></span>
          <span class="brand__text">Malik</span>
        </a>

        <nav class="topbar__actions" aria-label="Site actions">
          <button id="themeToggle" class="icon-btn" type="button" aria-label="Toggle dark mode">☾</button>
        </nav>
      </div>
    </header>

    <main class="container-medium landing-layout reveal">
      <div>
        <section class="intro-block" style="margin-bottom: 3rem;">
          <h1 style="color: var(--text); font-size: clamp(2rem, 5vw, 3.5rem); margin: 0 0 1.2rem 0; letter-spacing: -0.04em; line-height: 1.1;">
            Malik
          </h1>
          <p>Building simple, useful things on the web.</p>
          <p>Focused on clean design, practical tools, and projects that actually get used.</p>
        </section>

        <!-- I've changed this container to stack the groups vertically -->
        <div class="links-container" style="display: flex; flex-direction: column; gap: 2rem;">
          <nav class="links-group" aria-label="Projects">
            <h2 class="links-group__title">View Projects</h2>
            <!-- The links inside this group remain inline -->
            <div style="display: flex; flex-wrap: wrap; gap: 1rem 1.5rem;">
              <a class="text-link" href="https://lcna.whosmalikx.com" target="_blank" rel="noopener noreferrer">Limbus Company News Archive ↗</a>
            </div>
          </nav>
          
          <nav class="links-group" aria-label="Social Media">
            <h2 class="links-group__title">Get in touch</h2>
            <!-- The links inside this group also remain inline -->
            <div style="display: flex; flex-wrap: wrap; gap: 1rem 1.5rem;">
              <a class="text-link" href="https://linkedin.com/in/malikwork" target="_blank" rel="noopener noreferrer">LinkedIn ↗</a>
              <a class="text-link" href="https://github.com/itsmalikx" target="_blank" rel="noopener noreferrer">GitHub ↗</a>
            </div>
          </nav>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container-wide flex-col" style="align-items: center; gap: 14px;">
        <div>
          <a href="privacy.html" class="footer-link">Privacy Policy</a>
        </div>
        <!-- I've also updated the year in the copyright notice for you -->
        <span class="text-muted" style="font-size: 0.85rem;">Copyright © 2024 Malik. All rights reserved.</span>
      </div>
    </footer>
  </div>

  <script src="assets/js/theme.js"></script>
</body>
</html>
